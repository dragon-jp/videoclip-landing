<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="annBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F0E4"/>
      <stop offset="1" stop-color="#EAE1CA"/>
    </linearGradient>
    <filter id="softShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="500" rx="32" fill="url(#annBg)"/>

  <!-- Video card -->
  <g filter="url(#softShadow2)" transform="rotate(-4 210 250)">
    <rect x="80" y="130" width="260" height="240" rx="20" fill="#1B1B1A"/>
    <circle cx="210" cy="240" r="38" fill="#FFFFFF" fill-opacity="0.12"/>
    <circle cx="210" cy="240" r="22" fill="#D9B979"/>
    <polygon points="204,230 204,250 222,240" fill="#0A0A0A"/>
    <rect x="100" y="316" width="130" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.7"/>
    <rect x="100" y="332" width="180" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.3"/>
  </g>

  <!-- Note paper overlapping -->
  <g filter="url(#softShadow2)" transform="rotate(5 400 280)">
    <rect x="300" y="160" width="220" height="260" rx="14" fill="#FFFFFF"/>
    <!-- Quote -->
    <text x="320" y="210" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#0A0A0A" fill-opacity="0.18">&#8220;</text>
    <!-- Lines of note -->
    <g fill="#0A0A0A">
      <rect x="320" y="228" width="164" height="6" rx="3" fill-opacity="0.78"/>
      <rect x="320" y="246" width="180" height="6" rx="3" fill-opacity="0.78"/>
      <rect x="320" y="264" width="140" height="6" rx="3" fill-opacity="0.78"/>
      <rect x="320" y="290" width="170" height="5" rx="2.5" fill-opacity="0.32"/>
      <rect x="320" y="304" width="120" height="5" rx="2.5" fill-opacity="0.32"/>
      <rect x="320" y="318" width="150" height="5" rx="2.5" fill-opacity="0.32"/>
    </g>
    <!-- Tag -->
    <rect x="320" y="360" width="80" height="22" rx="11" fill="#0A0A0A" fill-opacity="0.08"/>
    <text x="332" y="375" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0A0A0A" fill-opacity="0.7" letter-spacing="1">IDEA</text>
  </g>
</svg>
