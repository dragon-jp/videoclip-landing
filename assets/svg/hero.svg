<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F0E4"/>
      <stop offset="1" stop-color="#E8E1CD"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1B1A"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9B979"/>
      <stop offset="1" stop-color="#B28A3F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="720" rx="48" fill="url(#heroBg)"/>

  <!-- Orbit guide -->
  <circle cx="300" cy="360" r="260" stroke="#0A0A0A" stroke-opacity="0.08" stroke-dasharray="2 8"/>
  <circle cx="300" cy="360" r="170" stroke="#0A0A0A" stroke-opacity="0.06" stroke-dasharray="2 6"/>

  <!-- Background cards (thumbnails) -->
  <g filter="url(#shadow)">
    <rect x="90" y="140" width="140" height="90" rx="14" fill="#FFFFFF" transform="rotate(-8 160 185)"/>
    <rect x="100" y="155" width="60" height="6" rx="3" fill="#0A0A0A" fill-opacity="0.08" transform="rotate(-8 160 185)"/>
    <rect x="100" y="170" width="90" height="6" rx="3" fill="#0A0A0A" fill-opacity="0.08" transform="rotate(-8 160 185)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="110" width="150" height="100" rx="16" fill="#FFFFFF" transform="rotate(7 455 160)"/>
    <circle cx="455" cy="160" r="20" fill="#0A0A0A" fill-opacity="0.08" transform="rotate(7 455 160)"/>
    <polygon points="450,150 450,170 466,160" fill="#0A0A0A" fill-opacity="0.45" transform="rotate(7 455 160)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="500" width="140" height="90" rx="14" fill="#FFFFFF" transform="rotate(6 140 545)"/>
    <rect x="82" y="518" width="70" height="6" rx="3" fill="#0A0A0A" fill-opacity="0.08" transform="rotate(6 140 545)"/>
    <rect x="82" y="532" width="110" height="6" rx="3" fill="#0A0A0A" fill-opacity="0.08" transform="rotate(6 140 545)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="520" width="140" height="90" rx="14" fill="#FFFFFF" transform="rotate(-5 470 565)"/>
    <circle cx="470" cy="565" r="18" stroke="#0A0A0A" stroke-opacity="0.25" stroke-width="2" transform="rotate(-5 470 565)"/>
  </g>

  <!-- Main feature card -->
  <g filter="url(#shadow)">
    <rect x="180" y="250" width="240" height="260" rx="28" fill="url(#cardDark)"/>
    <!-- Top label -->
    <rect x="204" y="278" width="60" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <!-- Play circle -->
    <circle cx="300" cy="370" r="44" fill="#FFFFFF" fill-opacity="0.12"/>
    <circle cx="300" cy="370" r="28" fill="url(#cardAmber)"/>
    <polygon points="294,358 294,382 314,370" fill="#0A0A0A"/>
    <!-- Bottom lines -->
    <rect x="204" y="438" width="120" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="204" y="456" width="180" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.24"/>
    <rect x="204" y="472" width="140" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.24"/>
  </g>

  <!-- Accent dot -->
  <circle cx="470" cy="260" r="10" fill="url(#cardAmber)"/>
</svg>
