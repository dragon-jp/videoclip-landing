<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="privBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEE8D3"/>
      <stop offset="1" stop-color="#DED2A8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D9B979" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D9B979" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="500" rx="32" fill="url(#privBg)"/>

  <!-- Glow -->
  <circle cx="300" cy="250" r="220" fill="url(#glow)"/>

  <!-- Phone frame -->
  <rect x="220" y="130" width="160" height="280" rx="32" fill="#1B1B1A"/>
  <rect x="232" y="142" width="136" height="256" rx="22" fill="#FAFAF7"/>

  <!-- Lock shape centered in phone -->
  <g transform="translate(280 220)">
    <!-- Shackle -->
    <path d="M 12 20 Q 12 4 20 4 Q 40 4 40 20 L 40 32 L 32 32 L 32 20 Q 32 12 26 12 Q 20 12 20 20 L 20 32 L 12 32 Z" fill="#0A0A0A"/>
    <!-- Body -->
    <rect x="2" y="32" width="52" height="44" rx="6" fill="#0A0A0A"/>
    <!-- Keyhole -->
    <circle cx="28" cy="52" r="5" fill="#D9B979"/>
    <rect x="26" y="52" width="4" height="10" rx="1" fill="#D9B979"/>
  </g>

  <!-- Shield indicators -->
  <g stroke="#0A0A0A" stroke-width="1.5" fill="none" stroke-opacity="0.3">
    <circle cx="300" cy="260" r="90" stroke-dasharray="2 6"/>
    <circle cx="300" cy="260" r="120" stroke-dasharray="2 8"/>
  </g>

  <!-- "No cloud" indicator -->
  <g transform="translate(420 370)">
    <path d="M 10 15 Q 4 15 4 10 Q 4 4 12 4 Q 16 0 22 4 Q 30 4 30 12 Q 30 18 24 18 L 10 18 Z" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="32" y2="22" stroke="#B94A3E" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="420" y="410" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0A0A0A" fill-opacity="0.6" letter-spacing="1.2">NO SERVER</text>

  <!-- Face ID corner indicator -->
  <g transform="translate(110 100)" stroke="#0A0A0A" stroke-width="2" fill="none">
    <path d="M 0 10 L 0 0 L 10 0" stroke-linecap="round"/>
    <path d="M 40 0 L 50 0 L 50 10" stroke-linecap="round"/>
    <path d="M 0 40 L 0 50 L 10 50" stroke-linecap="round"/>
    <path d="M 50 40 L 50 50 L 40 50" stroke-linecap="round"/>
    <circle cx="18" cy="22" r="1.5" fill="#0A0A0A"/>
    <circle cx="32" cy="22" r="1.5" fill="#0A0A0A"/>
    <path d="M 20 34 Q 25 38 30 34" stroke-linecap="round"/>
  </g>
  <text x="110" y="172" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0A0A0A" fill-opacity="0.6" letter-spacing="1.2">FACE ID</text>
</svg>
