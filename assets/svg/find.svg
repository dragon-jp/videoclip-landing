<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="findBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3EEDF"/>
      <stop offset="1" stop-color="#E3D9BF"/>
    </linearGradient>
    <filter id="softShadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="500" rx="32" fill="url(#findBg)"/>

  <!-- Connection lines (radial to hit card) -->
  <g stroke="#0A0A0A" stroke-opacity="0.14" stroke-dasharray="3 6">
    <line x1="300" y1="250" x2="120" y2="120"/>
    <line x1="300" y1="250" x2="480" y2="130"/>
    <line x1="300" y1="250" x2="140" y2="400"/>
    <line x1="300" y1="250" x2="470" y2="390"/>
  </g>

  <!-- Scattered cards (muted) -->
  <g fill="#FFFFFF" stroke="#0A0A0A" stroke-opacity="0.1">
    <rect x="60" y="80" width="110" height="70" rx="10" filter="url(#softShadow3)"/>
    <rect x="420" y="90" width="110" height="70" rx="10" filter="url(#softShadow3)"/>
    <rect x="70" y="360" width="110" height="70" rx="10" filter="url(#softShadow3)"/>
    <rect x="410" y="360" width="110" height="70" rx="10" filter="url(#softShadow3)"/>
  </g>
  <g fill="#0A0A0A" fill-opacity="0.12">
    <rect x="76" y="92" width="56" height="4" rx="2"/>
    <rect x="76" y="104" width="80" height="4" rx="2"/>
    <rect x="436" y="102" width="62" height="4" rx="2"/>
    <rect x="436" y="114" width="40" height="4" rx="2"/>
    <rect x="86" y="372" width="72" height="4" rx="2"/>
    <rect x="86" y="384" width="50" height="4" rx="2"/>
    <rect x="426" y="372" width="62" height="4" rx="2"/>
    <rect x="426" y="384" width="84" height="4" rx="2"/>
  </g>

  <!-- Matched highlighted card (amber) -->
  <g filter="url(#softShadow3)">
    <rect x="236" y="210" width="168" height="80" rx="14" fill="#D9B979"/>
    <rect x="252" y="226" width="100" height="6" rx="3" fill="#0A0A0A" fill-opacity="0.75"/>
    <rect x="252" y="242" width="136" height="5" rx="2.5" fill="#0A0A0A" fill-opacity="0.4"/>
    <rect x="252" y="256" width="80" height="5" rx="2.5" fill="#0A0A0A" fill-opacity="0.4"/>
  </g>

  <!-- Search ring on top-left of matched card -->
  <g transform="translate(480 260)">
    <circle r="34" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
    <circle r="22" fill="none" stroke="#0A0A0A" stroke-width="3"/>
    <line x1="16" y1="16" x2="38" y2="38" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Search string label -->
  <g transform="translate(200 330)">
    <rect width="200" height="38" rx="19" fill="#0A0A0A"/>
    <text x="24" y="24" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" fill-opacity="0.9">italian recipe</text>
    <circle cx="180" cy="19" r="4" fill="#D9B979"/>
  </g>
</svg>
