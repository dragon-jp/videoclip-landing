<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="orgBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#ECE4CE"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="500" rx="32" fill="url(#orgBg)"/>

  <!-- Shelf lines -->
  <line x1="60" y1="150" x2="540" y2="150" stroke="#0A0A0A" stroke-opacity="0.12"/>
  <line x1="60" y1="270" x2="540" y2="270" stroke="#0A0A0A" stroke-opacity="0.12"/>
  <line x1="60" y1="390" x2="540" y2="390" stroke="#0A0A0A" stroke-opacity="0.12"/>

  <!-- Folder labels -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0A0A0A" fill-opacity="0.55" letter-spacing="1.2">
    <text x="60" y="138">COOKING / 24</text>
    <text x="60" y="258">INTERIOR / 17</text>
    <text x="60" y="378">REWATCH / 9</text>
  </g>

  <!-- Row 1 cards -->
  <g filter="url(#softShadow)">
    <rect x="60" y="160" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="72" y="172" width="40" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
    <rect x="72" y="184" width="80" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="190" y="160" width="120" height="80" rx="12" fill="#1B1B1A"/>
    <circle cx="250" cy="200" r="14" fill="#D9B979"/>
    <polygon points="246,193 246,207 258,200" fill="#0A0A0A"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="320" y="160" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="332" y="172" width="64" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
    <rect x="332" y="184" width="50" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>

  <!-- Row 2 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="280" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <circle cx="120" cy="320" r="12" stroke="#0A0A0A" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="190" y="280" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="202" y="292" width="56" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
    <rect x="202" y="304" width="90" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="320" y="280" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="332" y="292" width="40" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
    <rect x="332" y="304" width="74" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="450" y="280" width="90" height="80" rx="12" fill="#FFFFFF" stroke="#0A0A0A" stroke-opacity="0.18" stroke-dasharray="4 4"/>
    <line x1="495" y1="310" x2="495" y2="330" stroke="#0A0A0A" stroke-opacity="0.4" stroke-width="2"/>
    <line x1="485" y1="320" x2="505" y2="320" stroke="#0A0A0A" stroke-opacity="0.4" stroke-width="2"/>
  </g>

  <!-- Row 3 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="400" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="72" y="412" width="60" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="190" y="400" width="120" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="202" y="412" width="48" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
    <rect x="202" y="424" width="86" height="5" rx="2" fill="#0A0A0A" fill-opacity="0.14"/>
  </g>
</svg>
