<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }}{% if page.title != site.title %} — {{ site.title }}{% endif %}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#F5F0E4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0B0B09" media="(prefers-color-scheme: dark)" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <div class="scroll-progress" aria-hidden="true"></div>

  <header class="site-header">
    <div class="nav">
      <a href="{{ '/' | relative_url }}" class="brand">VideoClip</a>
      <nav class="nav-links">
        <a href="{{ '/#features' | relative_url }}">Features</a>
        <a href="{{ '/#pricing' | relative_url }}">Pricing</a>
        <a href="{{ '/support/' | relative_url }}">Support</a>
        <a href="{{ '/#download' | relative_url }}" class="btn btn-primary">Get the App</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="brand">VideoClip</p>
        <p class="muted small">見たい動画を、<br />忘れない場所へ。</p>
      </div>
      <div>
        <p class="label">Product</p>
        <a href="{{ '/#features' | relative_url }}">Features</a>
        <a href="{{ '/#pricing' | relative_url }}">Pricing</a>
        <a href="{{ '/#download' | relative_url }}">Download</a>
      </div>
      <div>
        <p class="label">Legal</p>
        <a href="https://dragon-jp.github.io/videoclip-privacy-policy/">Privacy</a>
        <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">Terms (EULA)</a>
      </div>
      <div>
        <p class="label">Contact</p>
        <a href="mailto:alaofficial.jp@gmail.com">alaofficial.jp@gmail.com</a>
        <a href="{{ '/support/' | relative_url }}">Support</a>
      </div>
    </div>
    <div class="container copyright">
      <p class="muted small">© <span id="year">2026</span> VideoClip — Built by an independent developer.</p>
      <p class="muted small">Made with care in Japan.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
