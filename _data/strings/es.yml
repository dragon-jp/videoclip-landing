features_head:
  eyebrow: "Features"
  title:
    - "Solo lo necesario."
    - "Nada de lo demás."
  sub: "Sin notificaciones, sin recomendaciones, sin anuncios. Solo los vídeos que guardas y lo que pensaste sobre ellos."

features:
  - num: "01 — Organize"
    title: ["Carpetas,", "con el sentido que tú les das"]
    body: "Temas, estados de ánimo, proyectos. Ordena y anida libremente. Convierte un montón de vídeos en una estantería que puedes volver a leer."
  - num: "02 — Think"
    title: ["Notas,", "junto a cada vídeo"]
    body: "Por qué lo guardaste, qué te gustó. Notas pequeñas con soporte Markdown, justo al lado del vídeo."
  - num: "03 — Private"
    title: ["Todo se queda", "en tu dispositivo"]
    body: "No se envía nada a nuestros servidores. Sin IDs de publicidad, sin SDKs de seguimiento. Puedes bloquear carpetas con Face ID."
  - num: "04 — Share"
    title: ["Guarda desde cualquier app,", "con un solo toque"]
    body: "Elige VideoClip en el menú compartir de Safari, Instagram o YouTube. Y ya."
  - num: "05 — Search"
    title: ["Una palabra", "y lo encuentras"]
    body: "Busca a la vez entre títulos, notas y etiquetas. Las carpetas no estorban."
  - num: "06 — AI"
    title: ["Resúmenes con IA,", "solo si los pides"]
    body: "Configura tu propia API key de Gemini y genera resúmenes. Sin clave, no hay ninguna conexión."

showcase:
  - tag: "Organize"
    title: ["Las carpetas son", "el mapa de tu atención."]
    body: "\"Cocina\", \"Ideas de interiorismo\", \"Películas para revisionar\". Los nombres que eliges cuentan en qué piensas. Cuantos más vídeos añades, más nítido se vuelve el mapa."
    bullets:
      - "Carpetas anidadas y reordenables"
      - "Varias etiquetas por vídeo"
      - "Iconos y colores para identificar al vuelo"
    img: organize
  - tag: "Annotate"
    title: ["Las notas son", "cartas para tu yo futuro."]
    body: "Muchos vídeos, al volver a ellos, ya no recuerdas por qué los guardaste. VideoClip pone una nota pequeña al lado de cada uno. Para que aún sirvan."
    bullets:
      - "Escribe directamente en Markdown"
      - "Una nota por vídeo, bien vinculada"
      - "Las notas también aparecen en la búsqueda"
    img: annotate
  - tag: "Find"
    title: ["Vuelves con", "una sola palabra."]
    body: "Por mucho que crezcan las carpetas o se acumulen las notas, la búsqueda atraviesa todo. \"Aquel vídeo de pasta italiana\" — con eso basta."
    bullets:
      - "Títulos, notas y etiquetas en una consulta"
      - "Los más recientes primero"
      - "Resultados que cruzan carpetas"
    img: find
  - tag: "Private by default"
    title: ["Tu curiosidad", "es solo tuya."]
    body: "Los enlaces que guardas, las notas que escribes, cómo organizas. Nada de eso sale del dispositivo. Ni servidores nuestros, ni IDs de publicidad. La curiosidad no tiene por qué ser vigilada."
    bullets:
      - "Cero tráfico a servidores nuestros"
      - "Face ID para carpetas privadas"
      - "Sin rastreadores de anuncios, analítica ni IDFA"
    img: private

