faq_head: "Preguntas habituales"

faq:
  - q: "¿VideoClip guarda los vídeos en sí?"
    a: "No. VideoClip guarda la URL de YouTube, Instagram, etc. Al reproducir, tu dispositivo habla directamente con la plataforma que los aloja. No tocamos el archivo de vídeo."
  - q: "¿Hay anuncios o seguimiento?"
    a: "Ninguno. Sin AdMob, sin Firebase Analytics, sin SDKs de seguimiento. Tampoco leemos tu IDFA."
  - q: "¿Tengo que usar los resúmenes con IA?"
    a: "No. Solo se activan si pones tu propia API key de Google Gemini. Sin clave, no se hace ninguna conexión."
  - q: "¿Se puede cancelar la suscripción?"
    a: "Sí. Mensual y anual se pueden cancelar en cualquier momento en Ajustes → Apple ID → Suscripciones. El plan de por vida no tiene nada que cancelar."
  - q: "¿Se sincroniza entre dispositivos?"
    a: "Todavía no. De momento todo es local. La sincronización con iCloud está en la hoja de ruta."

cta:
  title:
    - "Dale a tu \"ver más tarde\""
    - "un lugar tranquilo."
  sub: "Te avisamos por email en cuanto apruebe la revisión."
  button: "Avísame al salir"
