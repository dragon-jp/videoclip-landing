faq_head: "常見問題"

faq:
  - q: "跟 IG / YouTube 的「儲存」有什麼不一樣?"
    a: "IG 的儲存不能分類、找不到;YouTube 也一樣。VideoClip 讓你自己命名資料夾、加筆記,之後用一句話就能搜回來。影片還是在原平台播放,我們只幫你整理。"
  - q: "是把影片本體存進應用裡嗎?"
    a: "不是。VideoClip 保存的是 YouTube、Instagram 等來源的 URL,播放時是你的裝置直接與那些服務通訊。我們不會接觸你的影片檔案。"
  - q: "有廣告或行為追蹤嗎?"
    a: "沒有。沒有使用 AdMob、Firebase Analytics 或任何追蹤 SDK。也不取廣告 ID (IDFA)。"
  - q: "AI 摘要一定要用嗎?"
    a: "不用。只有在你填入自己取得的 Google Gemini API 金鑰後才會運作。沒填就完全不會通訊。"
  - q: "訂閱可以取消嗎?"
    a: "可以。月費、年費隨時可在 iOS「設定」→「Apple ID」→「訂閱」取消。買斷版沒有取消的概念。"
  - q: "可以多台裝置同步嗎?"
    a: "目前僅限裝置內本地儲存。iCloud 同步是未來更新的考慮項目。"

