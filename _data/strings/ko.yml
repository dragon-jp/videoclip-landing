    title: ["당신의 관심은,", "오직 당신의 것."]
    body: "저장한 URL도, 작성한 메모도, 정렬의 습관도, 기기 밖으로 나가지 않습니다. 제 서버도 없고 광고 ID도 수집하지 않습니다."
