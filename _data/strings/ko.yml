faq_head: "자주 묻는 질문"

faq:
  - q: "영상 자체를 앱 안에 저장하나요?"
    a: "아니요. YouTube, Instagram 등 호스팅 서비스의 URL만 저장하고, 재생할 때 기기가 직접 해당 서비스와 통신합니다. 영상 파일을 당사 서버로 보내지 않습니다."
  - q: "광고나 행동 추적이 있나요?"
    a: "없습니다. AdMob, Firebase Analytics 등 추적 SDK를 전혀 사용하지 않습니다. 광고 ID(IDFA)도 수집하지 않습니다."
  - q: "AI 요약 기능은 반드시 써야 하나요?"
    a: "아니요. 직접 준비한 Google Gemini API 키를 등록한 경우에만 동작합니다. 등록하지 않으면 통신이 발생하지 않습니다."
  - q: "구독을 취소할 수 있나요?"
    a: "월간·연간 구독은 언제든 iOS '설정' → 'Apple ID' → '구독'에서 해지할 수 있습니다. 평생 플랜은 해지 개념이 없습니다."
  - q: "여러 기기에서 동기화되나요?"
    a: "현재는 기기 내 로컬 저장만 지원합니다. iCloud 동기화는 향후 업데이트에서 검토 중입니다."

