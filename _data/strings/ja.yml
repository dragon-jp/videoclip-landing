  - tag: "Annotate"
    title:
      - "動画の隣に、"
      - "小さなメモを置く。"
    body: "あとで見返しても、なぜ保存したか思い出せないことは多いもの。VideoClip では動画ごとにノートを 1 枚書けます。読み返したときに、ちゃんと役に立ちます。"
    bullets:
      - "Markdown 記法でそのまま書ける"
      - "動画と 1:1 で紐づくミニノート"
      - "検索にもメモ本文が含まれる"
    img: annotate
  - tag: "Find"
    title:
      - "いつでも、"
      - "一語で戻ってこれる。"
    body: "フォルダが増えても、メモが積み重なっても、検索がすべてを横断します。「あのイタリア料理の動画」— その一言で十分です。"
    bullets:
      - "タイトル・メモ・タグを一括検索"
      - "最近見たものから順にソート"
      - "フォルダを越えて結果を表示"
    img: find
  - tag: "Private by default"
    title:
      - "端末の中だけで、"
      - "完結する。"
    body: "保存した URL、書いたメモ、並びの癖。どれも端末の中だけに留まります。自社サーバーもなし、広告 ID も取りません。何を見ているか、あなたの中だけの話。"
    bullets:
      - "自社サーバーへの送信ゼロ"
      - "Face ID でプライベートフォルダを保護"
      - "広告 SDK / 解析 SDK / IDFA すべて不使用"
    img: private

