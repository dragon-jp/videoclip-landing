  - tag: "Annotate"
    title:
      - "メモは、"
      - "未来の自分への手紙。"
    body: "あとで見返したとき、なぜ保存したかを思い出せる動画は多くありません。VideoClip は、動画の隣に小さなノートを置きます。読み返したときに、ちゃんと役に立つように。"
    bullets:
      - "Markdown 記法でそのまま書ける"
      - "動画と 1:1 で紐づくミニノート"
      - "検索にもメモ本文が含まれる"
    img: annotate
  - tag: "Find"
    title:
      - "いつでも、"
      - "一語で戻ってこれる。"
    body: "フォルダが増えても、メモが積み重なっても、検索がすべてを横断します。「あのイタリア料理の動画」— その一言で十分です。"
    bullets:
      - "タイトル・メモ・タグを一括検索"
      - "最近見たものから順にソート"
      - "フォルダを越えて結果を表示"
    img: find
  - tag: "Private by default"
    title:
      - "あなたの関心は、"
      - "あなただけのもの。"
    body: "保存した URL、書いたメモ、並びの癖。こうしたものは端末の外に出ません。自社サーバーもなければ、広告 ID も取りません。好奇心は、誰にも監視されなくていい。"
    bullets:
      - "自社サーバーへの送信ゼロ"
      - "Face ID でプライベートフォルダを保護"
      - "広告 SDK / 解析 SDK / IDFA すべて不使用"
    img: private

