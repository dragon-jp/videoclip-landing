      - "見た理由を残す"
    body: "なぜ保存したのか。どこが良かったのか。Markdown でそのまま書ける、小さなノート機能。"
  - num: "03 — Private"
    title:
      - "すべて、"
      - "端末の中で完結する"
    body: "自社サーバーへの送信なし、広告 ID の取得なし、追跡 SDK なし。Face ID でロックも可能。"
  - num: "04 — Share"
    title:
      - "共有シートから、"
      - "一瞬で保存"
    body: "Safari や Instagram、YouTube の共有メニューから VideoClip を選ぶだけで、URL を取り込めます。"
  - num: "05 — Search"
    title:
      - "タイトルでもメモでも、"
      - "横断検索"
    body: "思い出したキーワードひとつで、フォルダを越えて見つけ出せます。"
  - num: "06 — AI"
    title:
      - "必要なときだけ、"
      - "AI に要約させる"
    body: "自分で取得した Gemini API キーを設定すれば、動画の要約を生成可能。未設定なら通信なし。"

