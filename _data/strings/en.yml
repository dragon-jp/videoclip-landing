faq_head: "Questions people ask"

faq:
  - q: "Does VideoClip store the videos themselves?"
    a: "No. VideoClip stores the URL from YouTube, Instagram, etc. When you play, your device talks directly to the hosting service. We never touch your video files."
  - q: "Are there ads or tracking?"
    a: "None. No AdMob, no Firebase Analytics, no behavior-tracking SDKs. We don't read your IDFA either."
  - q: "Do I have to use the AI summaries?"
    a: "No. They only activate when you paste in your own Google Gemini API key. Without it, there's no network call."
  - q: "Can I cancel the subscription?"
    a: "Yes. Monthly and yearly plans are cancellable any time via iOS Settings → Apple ID → Subscriptions. The lifetime plan has nothing to cancel."
  - q: "Does it sync across devices?"
    a: "Not yet. Everything is local for now. iCloud sync is on the roadmap."

cta:
  title:
    - "Give your \"watch later\""
    - "a quieter home."
  sub: "Free to start. Upgrade if you need more."
  button: "Get on App Store"
