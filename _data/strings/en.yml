features_head:
  eyebrow: "Features"
  title:
    - "Only what you need."
    - "Nothing you don't."
  sub: "No notifications. No recommendations. No ads. Just the videos you saved and the thoughts you put next to them."

features:
  - num: "01 — Organize"
    title: ["Folders that", "make sense to you"]
    body: "Themes, moods, projects. Nest and reorder freely. Turn a pile of videos into a shelf you actually read."
  - num: "02 — Think"
    title: ["Notes next to", "every video"]
    body: "Why did you save it? What stood out? Markdown-friendly little notes, right where you'll find them."
  - num: "03 — Private"
    title: ["Everything stays", "on your device"]
    body: "No servers of ours. No ad IDs. No tracking SDKs. Lock private folders with Face ID."
  - num: "04 — Share"
    title: ["Save from any app", "in one tap"]
    body: "Pick VideoClip from the iOS share sheet in Safari, Instagram, or YouTube. That's it."
  - num: "05 — Search"
    title: ["One word gets you", "back to the video"]
    body: "Search across titles, notes, and tags — cutting through folders."
  - num: "06 — AI"
    title: ["Summaries,", "only when you ask"]
    body: "Bring your own Gemini API key and get on-device summaries. Leave it blank and there's no network at all."

showcase:
  - tag: "Organize"
    title: ["Folders become", "a map of your attention."]
    body: "\"Cooking,\" \"Interior ideas,\" \"Films to rewatch.\" The folder names you pick describe what you care about. Add videos, and the map sharpens."
    bullets:
      - "Nest and reorder freely"
      - "Tag videos with multiple labels"
      - "Icons and colors at a glance"
    img: organize
  - tag: "Annotate"
    title: ["Notes are letters", "to your future self."]
    body: "Most videos you save come back unreadable — you forgot why. VideoClip keeps a small note next to each one, so it's still useful later."
    bullets:
      - "Write in Markdown"
      - "One note per video, tightly bound"
      - "Notes are included in search"
    img: annotate
  - tag: "Find"
    title: ["One word and", "you're back."]
    body: "As folders grow and notes stack up, search cuts through. \"That Italian pasta video\" — that's enough."
    bullets:
      - "Title, notes, and tags in one query"
      - "Recently watched at the top"
      - "Results reach across folders"
    img: find
  - tag: "Private by default"
    title: ["Your curiosity", "is yours alone."]
    body: "URLs saved, notes written, reorderings. None of it leaves your phone. No servers of ours, no ad IDs. Your curiosity doesn't have to be watched."
    bullets:
      - "Zero traffic to our servers"
      - "Face ID for private folders"
      - "No ad, analytics, or IDFA SDKs"
    img: private

